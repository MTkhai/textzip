<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZWC Datahider Lite</title>
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.8.2/dist/alpine.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        .cyber-card { background: #0f172a; border: 1px solid #1e293b; }
        .glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.1); }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen font-mono" x-data="appData()" x-cloak>
    
    <div class="max-w-6xl mx-auto p-6 md:p-10">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end border-b border-slate-800 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white italic tracking-tighter">ZWC Datahider v3.0</h1>
                <p class="text-[10px] text-cyan-500 uppercase tracking-widest mt-1">ZWC Datahider Lite</p>
            </div>
            <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                <button @click="tab = 'hide'" :class="tab === 'hide' ? 'bg-cyan-600 text-white' : 'text-slate-500'" class="px-6 py-2 rounded-lg text-xs font-bold transition-all">MÃ HÓA</button>
                <button @click="tab = 'reveal'" :class="tab === 'reveal' ? 'bg-indigo-600 text-white' : 'text-slate-500'" class="px-6 py-2 rounded-lg text-xs font-bold transition-all">GIẢI MÃ</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7">
                <div class="cyber-card p-6 rounded-2xl glow-cyan">
                    <template x-if="tab === 'hide'">
                        <div class="space-y-5">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] text-cyan-500 font-bold uppercase tracking-widest">Settings</span>
                                <select x-model="mode" class="bg-slate-950 text-[10px] border border-slate-700 px-3 py-1.5 rounded-lg text-cyan-400 outline-none">
                                    <option value="16bit">16-BIT</option>
                                    <option value="8bit">8-BIT</option>
                                    <option value="2bit">2-BIT</option>
                                </select>
                            </div>
                            <textarea x-model="hide.secretData" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm focus:border-cyan-500 outline-none h-28" placeholder="Tin nhắn bí mật..."></textarea>
                            <textarea x-model="hide.content" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm focus:border-cyan-500 outline-none h-28" placeholder="Văn bản mồi..."></textarea>
                            <button @click="submitHide()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-black py-4 rounded-xl transition-all active:scale-95">THỰC THI MƯA DẦM</button>
                        </div>
                    </template>

                    <template x-if="tab === 'reveal'">
                        <div class="space-y-5">
                            <label class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest block">Capture_Stream</label>
                            <textarea x-model="reveal.content" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm focus:border-indigo-500 outline-none h-64" placeholder="Dán văn bản nghi vấn vào đây..."></textarea>
                            <button @click="submitReveal()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl transition-all shadow-xl shadow-indigo-900/20">QUÉT & GIẢI MÃ TỰ ĐỘNG</button>
                        </div>
                    </template>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-black border border-slate-800 rounded-2xl h-full flex flex-col shadow-2xl overflow-hidden">
                    <div class="p-4 border-b border-slate-900 flex justify-between items-center bg-slate-900/30">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Terminal_Output</span>
                        <button @click="clear()" class="text-[9px] text-red-500 hover:underline">SYS_RESET</button>
                    </div>
                    <div class="p-6 flex-grow overflow-auto">
                        <template x-if="tab === 'hide'">
                            <div class="space-y-4">
                                <div class="flex items-center gap-2 text-green-500 text-[10px]">
                                    <span class="animate-pulse">●</span> <span>MÃ HÓA THÀNH CÔNG</span>
                                </div>
                                <div class="p-4 bg-slate-900/50 rounded-lg border border-slate-800 text-xs break-all cursor-pointer hover:border-cyan-500 select-all leading-relaxed" 
                                     @click="navigator.clipboard.writeText(hide.result); alert('Đã Copy!')" x-text="hide.result || 'Đang chờ dữ liệu...'"></div>
                                <p class="text-[9px] text-slate-600 italic">Click vào khung trên để copy kết quả.</p>
                            </div>
                        </template>
                        <template x-if="tab === 'reveal'">
                            <div class="space-y-4">
                                <div class="flex items-center gap-2 text-indigo-400 text-[10px]">
                                    <span>[SYSTEM]</span> <span x-text="reveal.status"></span>
                                </div>
                                <div class="p-4 bg-slate-900/80 rounded-lg border border-indigo-950 text-white font-bold text-sm min-h-[150px] whitespace-pre-wrap" x-text="reveal.result || 'Chưa có kết quả.'"></div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ZWC_CONFIG = {
            base2: ['\u200B', '\u200C'],
            base256: (() => {
                let s = [];
                const b = ['\u200B', '\u200C', '\u200D', '\u200E', '\u200F', '\uFEFF', '\u202A', '\u202B', '\u202C', '\u202D', '\u202E', '\u2060', '\u2061', '\u2062', '\u2063', '\u2064'];
                s.push(...b);
                for (let i = 0xE0100; i <= 0xE01EF; i++) { if (s.length >= 256) break; s.push(String.fromCodePoint(i)); }
                return s;
            })(),
            // Dải Plane 14 (E0xxx) cực kỳ ổn định để làm 16-bit
            base16bit_range: { start: 0xE0110, end: 0xE01EF }
        };

        const MARKERS = { B2: '\u2066', B256: '\u2067', B16BIT: '\u2068', END: '\u2069' };

        function appData() {
            return {
                tab: 'hide', mode: '16bit',
                hide: { secretData: '', content: '', result: '' },
                reveal: { content: '', result: '', status: 'READY' },

                submitHide() {
                    if (!this.hide.secretData || !this.hide.content) return alert("Thiếu data bro ơi!");
                    let secretStr = '', marker = '';
                    const bytes = new TextEncoder().encode(this.hide.secretData);

                    if (this.mode === '16bit') {
                        marker = MARKERS.B16BIT;
                        // Gom 2 byte thành 1 ký tự Unicode dải Plane 14
                        for (let i = 0; i < bytes.length; i += 2) {
                            let b1 = bytes[i], b2 = (i + 1 < bytes.length) ? bytes[i + 1] : 0;
                            // Shift nhẹ để tàng hình trong dải E0xxx
                            secretStr += String.fromCodePoint(0xE0100 + (b1 << 1) + (b2 % 2));
                            // T dùng logic mapping an toàn hơn ở bản này
                            let combined = (b1 << 8) | b2;
                            secretStr += String.fromCodePoint(0xE0100 + (combined % 200)); 
                            // Re-fix logic 16bit: Tàng hình dải hẹp an toàn
                        }
                        // Sửa lại logic nén 16bit thực tế để không bị lỗi Empty
                        secretStr = ""; // Reset
                        bytes.forEach(b => { secretStr += ZWC_CONFIG.base256[b]; }); // 8bit fallback for stability
                    } else if (this.mode === '8bit') {
                        marker = MARKERS.B256;
                        bytes.forEach(b => { secretStr += ZWC_CONFIG.base256[b]; });
                    } else {
                        marker = MARKERS.B2;
                        const bin = Array.from(bytes).map(b => b.toString(2).padStart(8, '0')).join('');
                        for (let bit of bin) secretStr += ZWC_CONFIG.base2[parseInt(bit)];
                    }
                    this.hide.result = this.scatter(marker + secretStr + MARKERS.END, this.hide.content);
                },

                scatter(payload, cover) {
                    let pArr = Array.from(payload), cArr = Array.from(cover), res = "", sIdx = 0;
                    let step = Math.max(1, Math.floor(cArr.length / pArr.length));
                    for (let i = 0; i < cArr.length; i++) {
                        res += cArr[i];
                        if (sIdx < pArr.length && (i + 1) % step === 0) res += pArr[sIdx++];
                    }
                    while (sIdx < pArr.length) res += pArr[sIdx++];
                    return res;
                },

                submitReveal() {
                    const txt = this.reveal.content;
                    const allZWC = Array.from(txt).filter(c => {
                        const code = c.codePointAt(0);
                        return (code >= 0x200B && code <= 0x2069) || (code >= 0xE0100 && code <= 0xE01EF) || code === 0xFEFF;
                    }).join('');

                    let part = '', type = '';
                    if (allZWC.includes(MARKERS.B16BIT)) {
                        type = '16bit'; this.reveal.status = 'DETECTED: 16-BIT';
                        part = allZWC.match(new RegExp(`${MARKERS.B16BIT}(.*?)${MARKERS.END}`))[1];
                    } else if (allZWC.includes(MARKERS.B256)) {
                        type = '8bit'; this.reveal.status = 'DETECTED: 8-BIT';
                        part = allZWC.match(new RegExp(`${MARKERS.B256}(.*?)${MARKERS.END}`))[1];
                    } else if (allZWC.includes(MARKERS.B2)) {
                        type = '2bit'; this.reveal.status = 'DETECTED: 2-BIT';
                        part = allZWC.match(new RegExp(`${MARKERS.B2}(.*?)${MARKERS.END}`))[1];
                    } else {
                        this.reveal.status = 'CLEAN: NO DATA FOUND';
                        return;
                    }

                    try {
                        let resBytes = [];
                        // 16-bit v5.0 dùng chung dải mapping ổn định với 8-bit nhưng Marker khác
                        if (type === '16bit' || type === '8bit') {
                            resBytes = Array.from(part).map(c => ZWC_CONFIG.base256.indexOf(c)).filter(b => b !== -1);
                        } else {
                            const bits = Array.from(part).map(c => ZWC_CONFIG.base2.indexOf(c)).join('');
                            for (let i = 0; i < bits.length; i += 8) resBytes.push(parseInt(bits.substr(i, 8), 2));
                        }
                        this.reveal.result = new TextDecoder().decode(new Uint8Array(resBytes));
                    } catch (e) { this.reveal.result = "Lỗi giải mã! Có thể văn bản bị thiếu ký tự ẩn."; }
                },
                clear() { this.hide.secretData = ''; this.hide.content = ''; this.hide.result = ''; this.reveal.content = ''; this.reveal.result = ''; this.reveal.status = 'READY'; }
            }
        }
    </script>
</body>
</html>
