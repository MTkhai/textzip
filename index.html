<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZWC Datahider Pro</title>
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.8.2/dist/alpine.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(90deg, #22d3ee, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-200 min-h-screen flex flex-col" x-data="data()">
    
    <nav class="border-b border-gray-800 p-4 glass sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold gradient-text">ZWC_DATAHIDER_v2.0</h1>
            <div class="flex space-x-2">
                <button @click="tab = 'hide'" :class="tab === 'hide' ? 'bg-cyan-600' : 'bg-gray-700'" class="px-4 py-1 rounded-md text-sm transition">Dấu Tin</button>
                <button @click="tab = 'reveal'" :class="tab === 'reveal' ? 'bg-cyan-600' : 'bg-gray-700'" class="px-4 py-1 rounded-md text-sm transition">Hiện Tin</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-6 flex justify-center items-start">
        <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="space-y-6">
                <template x-if="tab === 'hide'">
                    <div class="glass p-6 rounded-2xl border border-gray-700 shadow-xl">
                        <h2 class="text-cyan-400 mb-4 flex items-center">
                            <span class="mr-2">🔒</span> ENCRYPT_DATA
                        </h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">TIN MẬT (SECRET)</label>
                                <textarea x-model="hide.secretData" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm focus:border-cyan-500 outline-none h-24" placeholder="Nhập tin nhắn cần giấu..."></textarea>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">NỘI DUNG MỒI (COVER TEXT)</label>
                                <textarea x-model="hide.content" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm focus:border-cyan-500 outline-none h-24" placeholder="Nhập văn bản bình thường để đánh lạc hướng..."></textarea>
                            </div>
                            <button @click="hide.submit()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-cyan-900/20">
                                BẮT ĐẦU DẤU TIN 🚀
                            </button>
                        </div>
                    </div>
                </template>

                <template x-if="tab === 'reveal'">
                    <div class="glass p-6 rounded-2xl border border-gray-700 shadow-xl">
                        <h2 class="text-indigo-400 mb-4 flex items-center">
                            <span class="mr-2">🔓</span> DECRYPT_DATA
                        </h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">DÁN NỘI DUNG CHỨA TIN ẨN</label>
                                <textarea x-model="reveal.content" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm focus:border-indigo-500 outline-none h-48" placeholder="Dán văn bản có chứa ký tự ẩn vào đây..."></textarea>
                            </div>
                            <button @click="reveal.decrypt()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-indigo-900/20">
                                GIẢI MÃ NGAY 🕵️‍♂️
                            </button>
                        </div>
                    </div>
                </template>
            </div>

            <div class="space-y-6">
                <div class="glass p-6 rounded-2xl border border-dashed border-gray-600 h-full flex flex-col">
                    <h2 class="text-gray-400 mb-4 flex items-center justify-between">
                        <span>📡 OUTPUT_TERMINAL</span>
                        <button @click="clearAll()" class="text-[10px] hover:text-red-400 transition underline">CLEAR_ALL</button>
                    </h2>
                    
                    <div class="flex-grow bg-black/50 rounded-lg p-4 font-mono text-sm overflow-auto">
                        <template x-if="tab === 'hide'">
                            <div class="space-y-2">
                                <p class="text-green-500">>> Success!</p>
                                <div class="p-2 bg-gray-800 rounded border border-gray-700 break-all select-all cursor-pointer" title="Click to copy" @click="navigator.clipboard.writeText(hide.result); alert('Đã copy!')">
                                    <span x-text="hide.result || 'Chờ dữ liệu...'"></span>
                                </div>
                                <p class="text-xs text-gray-500 italic">* Copy đoạn trên gửi cho bạn bè, họ sẽ không thấy tin mật bằng mắt thường.</p>
                            </div>
                        </template>

                        <template x-if="tab === 'reveal'">
                            <div class="space-y-2">
                                <p class="text-indigo-400">>> Decoded Message:</p>
                                <div class="p-2 bg-gray-800 rounded border border-indigo-900 text-white font-bold min-h-[50px]">
                                    <span x-text="reveal.result || 'Chưa tìm thấy tin mật...'"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // BỘ LOGIC 8-BIT CỦA BRO
        const generateZWCSet = () => {
            let set = [];
            const basics = ['\u200B', '\u200C', '\u200D', '\u200E', '\u200F', '\uFEFF', '\u202A', '\u202B', '\u202C', '\u202D', '\u202E', '\u2060', '\u2061', '\u2062', '\u2063', '\u2064'];
            set.push(...basics);
            for (let i = 0xE0020; i <= 0xE010F; i++) {
                if (set.length >= 256) break;
                set.push(String.fromCodePoint(i));
            }
            return set;
        };

        const zwcSet = generateZWCSet();
        const START_MARKER = '\u2066'; 
        const END_MARKER = '\u2069';   

        function data() {
            return {
                tab: 'hide',
                hide: {
                    secretData: '',
                    content: '',
                    result: '',
                    submit() {
                        if (!this.secretData) return alert("Bro chưa nhập tin mật kìa!");
                        const bytes = new TextEncoder().encode(this.secretData);
                        let encoded = '';
                        bytes.forEach(byte => { encoded += zwcSet[byte]; });
                        this.result = `${START_MARKER}${encoded}${END_MARKER}${this.content}`;
                    }
                },
                reveal: {
                    content: '',
                    result: '',
                    decrypt() {
                        const regex = new RegExp(`${START_MARKER}([${zwcSet.join('')}]+)${END_MARKER}`);
                        const match = this.content.match(regex);
                        if (!match) return alert("Không tìm thấy tin ẩn!");
                        const chars = Array.from(match[1]);
                        const bytes = chars.map(char => zwcSet.indexOf(char)).filter(b => b !== -1);
                        try {
                            this.result = new TextDecoder().decode(new Uint8Array(bytes));
                        } catch (e) {
                            alert("Lỗi giải mã!");
                        }
                    }
                },
                clearAll() {
                    this.hide.secretData = ''; this.hide.result = ''; this.reveal.content = ''; this.reveal.result = '';
                }
            }
        }
    </script>
</body>
</html>
