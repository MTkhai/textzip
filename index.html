<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZWC Datahider Lite</title>
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.8.2/dist/alpine.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background: #020617; font-family: 'Consolas', 'Monaco', monospace; }
        .cyber-panel { background: rgba(15, 23, 42, 0.95); border: 1px solid #1e293b; }
        .cyber-input { background: #000; border: 1px solid #334155; color: #f1f5f9; }
        .cyber-input:focus { border-color: #06b6d4; outline: none; box-shadow: 0 0 10px rgba(6, 182, 212, 0.1); }
    </style>
</head>
<body class="text-slate-400 p-4 md:p-8" x-data="stealthEngine()" x-cloak>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 pb-6 border-b border-slate-800 gap-4">
            <div>
                <h1 class="text-2xl font-black text-white italic tracking-tighter">ZWC Datahider v5.0</h1>
                <p class="text-[10px] text-cyan-500 uppercase tracking-widest">ZWC Datahider Lite</p>
            </div>
            <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                <button @click="tab = 'encode'" :class="tab === 'encode' ? 'bg-cyan-600 text-white shadow-lg' : 'text-slate-500'" class="px-8 py-2 rounded-lg text-xs font-bold transition-all">ENCODE</button>
                <button @click="tab = 'decode'" :class="tab === 'decode' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500'" class="px-8 py-2 rounded-lg text-xs font-bold transition-all">DECODE</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7">
                <div class="cyber-panel p-6 rounded-3xl space-y-6">
                    
                    <template x-if="tab === 'encode'">
                        <div class="space-y-6">
                            <div class="grid grid-cols-2 gap-4 p-4 bg-slate-950 rounded-2xl border border-slate-800">
                                <div>
                                    <label class="text-[10px] font-bold text-cyan-500 uppercase block mb-2">Bit Stealth Mode</label>
                                    <select x-model="mode" class="w-full bg-black border border-slate-800 p-2 rounded text-xs text-white outline-none">
                                        <option value="32">32-Bit(Hybrid)</option>
                                        <option value="16">16-Bit</option>
                                        <option value="8">8-Bit</option>
                                        <option value="2">2-Bit</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-cyan-500 uppercase block mb-2">Shape stealth Options</label>
                                    <div class="flex gap-4 pt-1">
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="checkbox" x-model="mimic.space" class="accent-cyan-500">
                                            <span class="text-[10px]">SPACE</span>
                                        </label>
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="checkbox" x-model="mimic.punc" class="accent-cyan-500">
                                            <span class="text-[10px]">PUNC/HOMO</span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] text-slate-500 uppercase tracking-widest">Secret Message</label>
                                <textarea x-model="encode.secret" class="w-full cyber-input rounded-2xl p-4 text-sm h-28" placeholder="Message to hide..."></textarea>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] text-slate-500 uppercase tracking-widest">Cover Text</label>
                                <textarea x-model="encode.cover" class="w-full cyber-input rounded-2xl p-4 text-sm h-28" placeholder="Punctuation-rich text..."></textarea>
                            </div>
                            <button @click="processEncode()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-black py-5 rounded-2xl transition-all shadow-xl shadow-cyan-900/10 active:scale-95">DEPLOY SEALTH</button>
                        </div>
                    </template>

                    <template x-if="tab === 'decode'">
                        <div class="space-y-6">
                            <label class="text-[10px] font-bold text-indigo-400 uppercase block border-b border-slate-800 pb-2">Scanner Input</label>
                            <textarea x-model="decode.input" class="w-full cyber-input rounded-2xl p-4 text-sm h-72" placeholder="Paste suspected text here..."></textarea>
                            <button @click="processDecode()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl active:scale-95">AUTO-SCAN PAYLOAD</button>
                        </div>
                    </template>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-black/60 border border-slate-800 rounded-3xl h-full flex flex-col overflow-hidden shadow-2xl">
                    <div class="p-4 bg-slate-900/30 border-b border-slate-900 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-slate-500">SYSTEM_TERMINAL</span>
                        <button @click="reset()" class="text-[9px] text-red-500 hover:underline font-bold">SYS_RESET</button>
                    </div>
                    <div class="p-6 space-y-8 flex-grow overflow-auto">
                        <div>
                            <p class="text-[10px] text-cyan-500 mb-2 font-bold italic uppercase tracking-tighter">>> Result_Output</p>
                            <div @click="copy(encode.result)" class="p-5 bg-slate-950 rounded-2xl border border-slate-800 text-[11px] break-all cursor-pointer hover:border-cyan-500 transition select-all min-h-[100px] leading-relaxed" x-text="encode.result || 'IDLE_WAITING...'"></div>
                        </div>
                        <div class="border-t border-slate-900 pt-8">
    <div class="flex justify-between items-center mb-3">
        <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">>> Extracted_Payload</p>
        <span x-show="decode.bitType" x-text="decode.bitType" class="text-[9px] bg-indigo-900/50 text-indigo-300 px-2 py-0.5 rounded border border-indigo-500/30 font-bold"></span>
    </div>
    <div class="p-5 bg-slate-950 rounded-2xl border border-indigo-950 text-white font-bold text-sm min-h-[150px] whitespace-pre-wrap" x-text="decode.output || 'NO_DATA_EXTRACTED'"></div>
</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MIMIC_MAP = { ' ': '\u00A0', '.': '\u2024', ';': '\u037E', 'I': '\u006C', 'l': '\u0049' };
        const MARKERS = { B2: '\u2066', B8: '\u2067', B16: '\u2068', B32: '\u2061', END: '\u2069' };
        const ZWC_B2 = ['\u200B', '\u200C'];

        function stealthEngine() {
            return {
                tab: 'encode', mode: '32',
                mimic: { space: true, punc: true },
                encode: { secret: '', cover: '', result: '' },
                decode: { input: '', output: '' },

                processEncode() {
                    if(!this.encode.secret || !this.encode.cover) return;
                    const bytes = new TextEncoder().encode(this.encode.secret);
                    let payload = "", marker = "";

                    if (this.mode === '2') {
                        marker = MARKERS.B2;
                        const bin = Array.from(bytes).map(b => b.toString(2).padStart(8, '0')).join('');
                        for (let bit of bin) payload += ZWC_B2[parseInt(bit)];
                    } else {
                        // Hybrid Logic for 8, 16, 32 bit using Plane 14 mapping
                        marker = (this.mode === '32') ? MARKERS.B32 : (this.mode === '16' ? MARKERS.B16 : MARKERS.B8);
                        bytes.forEach(b => payload += String.fromCodePoint(0xE0100 + b));
                    }

                    const fullPayload = marker + payload + MARKERS.END;
                    let cArr = Array.from(this.encode.cover), pArr = Array.from(fullPayload), res = "", pIdx = 0;

                    for (let char of cArr) {
                        let out = char;
                        if(this.mimic.punc && MIMIC_MAP[char] && !/[\s]/.test(char)) out = Math.random() > 0.5 ? MIMIC_MAP[char] : char;
                        if(this.mimic.space && char === ' ') out = Math.random() > 0.5 ? MIMIC_MAP[' '] : char;
                        res += out;
                        if(pIdx < pArr.length && /[\s,.\b!?;:]/.test(char)) res += pArr[pIdx++];
                    }
                    while(pIdx < pArr.length) res += pArr[pIdx++];
                    this.encode.result = res;
                },

                processDecode() {
                    const txt = this.decode.input;
                    const raw = Array.from(txt).filter(c => {
                        const cp = c.codePointAt(0);
                        return (cp >= 0x200B && cp <= 0x2069) || (cp >= 0xE0100 && cp <= 0xE01EF);
                    }).join('');

                    const match = raw.match(/[\u2066\u2067\u2068\u2061](.*?)[\u2069]/);
                    if (match) {
                        const type = match[0][0];
                        const content = match[1];
                        let resBytes = [];
                        if (type === MARKERS.B2) {
                            const bits = Array.from(content).map(c => ZWC_B2.indexOf(c)).join('');
                            for (let i = 0; i < bits.length; i += 8) resBytes.push(parseInt(bits.substr(i, 8), 2));
                        } else {
                            resBytes = Array.from(content).map(c => c.codePointAt(0) - 0xE0100);
                        }
                        this.decode.output = new TextDecoder().decode(new Uint8Array(resBytes));
                    } else { this.decode.output = "Payload not found."; }
                },
                copy(t) { if(t) { navigator.clipboard.writeText(t); alert("Copied!"); } },
                reset() { this.encode = { secret: '', cover: '', result: '' }; this.decode = { input: '', output: '' }; }
            }
        }
    </script>
</body>
</html>
